name: Auto-Sync Security Workflows

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 2am
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync workflows to all repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="sriramshiv26-prog"
          echo "Starting workflow sync for: $USERNAME"
          
          # Get all repos
          repos=$(gh repo list $USERNAME --limit 100 --json nameWithOwner -q '.[].nameWithOwner')
          
          sync_count=0
          skip_count=0
          
          for repo in $repos; do
            echo "Processing: $repo"
            
            # Skip forks
            is_fork=$(gh repo view $repo --json isFork -q '.isFork' 2>/dev/null || echo "true")
            if [ "$is_fork" = "true" ]; then
              echo "  ✗ Skipped (fork)"
              skip_count=$((skip_count + 1))
              continue
            fi
            
            # Clone repo
            temp_dir="/tmp/sync-$$-$(date +%s)-$(basename $repo)"
            if ! git clone --depth 1 "https://x-access-token:$GH_TOKEN@github.com/$repo.git" "$temp_dir" 2>/dev/null; then
              echo "  ✗ Skipped (clone failed)"
              skip_count=$((skip_count + 1))
              continue
            fi
            
            cd "$temp_dir"
            
            # Check if all workflows already exist
            has_security=$([ -f ".github/workflows/security-scan.yml" ] && echo "true" || echo "false")
            has_renovate=$([ -f ".github/workflows/renovate.yml" ] && echo "true" || echo "false")
            has_config=$([ -f "renovate.json" ] && echo "true" || echo "false")
            
            if [ "$has_security" = "true" ] && [ "$has_renovate" = "true" ] && [ "$has_config" = "true" ]; then
              echo "  ✓ Already synced"
              cd - > /dev/null
              rm -rf "$temp_dir"
              skip_count=$((skip_count + 1))
              continue
            fi
            
            # Create workflows directory
            mkdir -p .github/workflows
            
            # Add security scan workflow if missing
            if [ "$has_security" = "false" ]; then
              cat > .github/workflows/security-scan.yml << 'SECURITY'
name: Comprehensive Security Scan (Week 2)
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  skill-scanner:
    runs-on: ubuntu-latest
    name: Unified Security Scan
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit semgrep
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: Run scan
        run: echo "Security scanning active"
        continue-on-error: true

  snyk:
    runs-on: ubuntu-latest
    name: Snyk - Dependency Check
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk
        uses: snyk/actions/python-3.11@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  sbom:
    runs-on: ubuntu-latest
    name: SBOM Generation
    steps:
      - uses: actions/checkout@v4
      - run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin && syft . -o spdx > sbom.json || true
SECURITY
              echo "  + Added security-scan.yml"
            fi
            
            # Add renovate workflow if missing
            if [ "$has_renovate" = "false" ]; then
              cat > .github/workflows/renovate.yml << 'RENOVATE'
name: Renovate
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v39
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configurationFile: renovate.json
RENOVATE
              echo "  + Added renovate.yml"
            fi
            
            # Add renovate config if missing
            if [ "$has_config" = "false" ]; then
              cat > renovate.json << 'CONFIG'
{
  "$schema": "https://docs.renovatebot.com/renovate-schema.json",
  "extends": ["config:base"],
  "timezone": "Asia/Singapore",
  "schedule": ["before 3am on Monday"],
  "automerge": true,
  "packageRules": [
    {
      "matchUpdateTypes": ["minor", "patch"],
      "automerge": true
    },
    {
      "matchUpdateTypes": ["major"],
      "labels": ["breaking-change"],
      "automerge": false
    }
  ]
}
CONFIG
              echo "  + Added renovate.json"
            fi
            
            # Commit and push changes
            git add .github/workflows/ renovate.json 2>/dev/null || true
            
            if git diff --cached --quiet; then
              echo "  ✓ No changes needed"
            else
              git commit -m "ci: auto-sync security workflows [skip ci]" --no-verify
              if git push origin main 2>/dev/null; then
                echo "  ✓ Synced"
                sync_count=$((sync_count + 1))
              else
                echo "  ✗ Push failed"
              fi
            fi
            
            cd - > /dev/null
            rm -rf "$temp_dir"
          done
          
          echo ""
          echo "=== Sync Summary ==="
          echo "Synced: $sync_count repos"
          echo "Skipped: $skip_count repos"
          echo "Complete!"
